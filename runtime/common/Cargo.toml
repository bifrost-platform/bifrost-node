[package]
name = "bifrost-common-runtime"
version = "1.0.0"
description = "The common runtime apis for Bifrost"
authors = { workspace = true }
homepage = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[dependencies]
parity-scale-codec = { workspace = true }
scale-info = { workspace = true }
ethereum = { workspace = true }

# Substrate
frame-system = { workspace = true }
frame-support = { workspace = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
pallet-bfc-utility = { workspace = true }

# Frontier
pallet-evm = { workspace = true }

# Bifrost
pallet-bifrost-evm-tx-payment = { path = "../../pallets/bifrost-evm-tx-payment", default-features = false }

[features]
default = ["std"]
std = [
	"scale-info/std",
	"ethereum/std",
	"parity-scale-codec/std",
	"frame-system/std",
	"frame-support/std",
	"sp-core/std",
	"sp-runtime/std",
	"sp-std/std",
	"pallet-bfc-utility/std",
	"pallet-evm/std",
	"pallet-bifrost-evm-tx-payment/std",
]
try-runtime = ["frame-support/try-runtime"]
